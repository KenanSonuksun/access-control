<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>API Login</title>
    <meta charset="UTF-8">
</head>
<body>
<h1>JWT API Login</h1>

<p>This page logs in through <code>/api/auth/login</code> and returns a JWT access token.</p>

<form id="apiLoginForm">
    <div>
        <label for="username">Username</label>
        <input id="username" type="text" name="username"/>
    </div>

    <div>
        <label for="password">Password</label>
        <input id="password" type="password" name="password"/>
    </div>

    <button type="submit">Login with JWT</button>
</form>

<h2>Result</h2>
<pre id="result"></pre>

<h2>Access Token</h2>
<textarea id="token" rows="10" cols="100" readonly></textarea>

<h2>Test Protected API</h2>
<button id="meButton" type="button">Call /api/me</button>
<pre id="meResult"></pre>

<script>
    const form = document.getElementById('apiLoginForm');
    const resultBox = document.getElementById('result');
    const tokenBox = document.getElementById('token');
    const meButton = document.getElementById('meButton');
    const meResult = document.getElementById('meResult');

    form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const payload = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            resultBox.textContent = JSON.stringify(data, null, 2);

            if (response.ok) {
                tokenBox.value = data.accessToken || '';
                localStorage.setItem('jwt_access_token', data.accessToken || '');
            } else {
                tokenBox.value = '';
                localStorage.removeItem('jwt_access_token');
            }
        } catch (error) {
            resultBox.textContent = 'Request failed: ' + error;
            tokenBox.value = '';
            localStorage.removeItem('jwt_access_token');
        }
    });

    meButton.addEventListener('click', async () => {
        const token = localStorage.getItem('jwt_access_token');

        if (!token) {
            meResult.textContent = 'No access token found. Please login first.';
            return;
        }

        try {
            const response = await fetch('/api/me', {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });

            const text = await response.text();
            meResult.textContent = text;
        } catch (error) {
            meResult.textContent = 'Request failed: ' + error;
        }
    });
</script>
</body>
</html>
